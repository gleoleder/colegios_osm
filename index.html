function pip(lat, lon, poly) {
  let inside = false;
  for (let i=0, j=poly.length-1; i<poly.length; j=i++) {
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if (((yi>lat)!==(yj>lat))&&(lon<(xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function assignDept(lat, lon) {
  for (const [d,poly] of Object.entries(DEPT_POLYS))
    if (pip(lat,lon,poly)) return d;
  return null;
}

function buildPopup(s, isNew) {
  const tag = isNew ? ' <span style="color:#10b981;font-size:.7rem">NUEVO</span>' : '';
  const rows = [
    ['Nombre', s.n||'(sin nombre)'],
    ['Tipo', s.tp||'&#8212;'],
    ['Departamento', s.d||'&#8212;'],
    s.op ? ['Operador',s.op] : null,
    s.ot ? ['Gesti&#243;n',s.ot] : null,
    s.lv ? ['Niveles',s.lv] : null,
    s.ph ? ['Tel&#233;fono',s.ph] : null,
    ['OSM ID','node/'+s.i],
  ].filter(Boolean).map(([k,v]) =>
    '<div class="popup-row"><span class="popup-key">'+k+'</span><span class="popup-val">'+v+'</span></div>'
  ).join('');
  return '<div class="popup-title">&#127979;'+tag+' '+(s.n||'(sin nombre)')+'</div>'+rows+
    '<a class="osm-link" href="https://www.openstreetmap.org/node/'+s.i+'" target="_blank">Ver en OpenStreetMap &#8599;</a>';
}

function renderAll(schools, dept) {
  cluster.clearLayers();
  Object.values(deptLayers).forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });
  let count = 0, named = 0;
  for (const s of schools) {
    if (dept !== 'all' && s.d !== dept) continue;
    if (s.n) named++;
    const m = L.marker([s.a, s.o], {icon: schoolIcon});
    m.bindPopup(buildPopup(s, false), {maxWidth:280});
    cluster.addLayer(m);
    count++;
  }
  if (dept !== 'all' && deptLayers[dept]) {
    deptLayers[dept].addTo(map);
    if (DEPT_BOUNDS[dept]) map.fitBounds(DEPT_BOUNDS[dept], {padding:[20,20]});
  } else if (dept === 'all') {
    map.setView([-15.5,-65.0], 6);
  }
  document.getElementById('statFiltered').textContent = count.toLocaleString();
  document.getElementById('countBadge').textContent   = count.toLocaleString() + ' colegios';
}

function addNewMarkers(newSchools) {
  for (const s of newSchools) {
    if (currentDept !== 'all' && s.d !== currentDept) continue;
    const m = L.marker([s.a, s.o], {icon: newIcon});
    m.bindPopup(buildPopup(s, true), {maxWidth:280});
    cluster.addLayer(m);
  }
}

function buildQuery() {
  return '[out:json][timeout:30];(node["amenity"="school"](-23.0,-70.5,-9.5,-57.0);node["amenity"="college"](-23.0,-70.5,-9.5,-57.0);node["building"="school"](-23.0,-70.5,-9.5,-57.0););out body qt;';
}

async function fetchOSM() {
  const urls = [CFG.overpassUrl, CFG.overpassMirror];
  const body = new URLSearchParams({data: buildQuery()}).toString();
  for (let i=0; i<urls.length; i++) {
    try {
      const r = await fetch(urls[i], {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded','Accept':'application/json'}, body});
      if (!r.ok) throw new Error('HTTP '+r.status);
      return await r.json();
    } catch(e) { if (i===urls.length-1) throw e; }
  }
}

async function bgUpdate() {
  setStatus('loading', 'Verificando nuevos colegios en OSM…');
  try {
    const data = await fetchOSM();
    const nuevos = [];
    for (const el of (data.elements||[])) {
      if (loadedIds.has(el.id)) continue;
      const dept = assignDept(el.lat, el.lon);
      if (!dept) continue;
      const t = el.tags||{};
      const s = {i:el.id, a:el.lat, o:el.lon, d:dept,
        n:t.name||t['name:es']||'', tp:t.amenity||t.building||'',
        op:t.operator||'', ot:t['operator:type']||'', ph:t.phone||'', lv:t.levels||''};
      loadedIds.add(el.id);
      SCHOOLS_DATA.push(s);
      nuevos.push(s);
    }
    const now = new Date();
    document.getElementById('statTotal').textContent = SCHOOLS_DATA.length.toLocaleString();
    document.getElementById('statTime').textContent  = now.toLocaleTimeString('es-BO');
    if (nuevos.length > 0) {
      pendingNew.push(...nuevos);
      document.getElementById('statNew').textContent  = pendingNew.length;
      document.getElementById('newCount').textContent = pendingNew.length;
      document.getElementById('newBadge').classList.add('show');
      setStatus('ok', '✓ '+nuevos.length+' nuevo(s) colegio(s) detectado(s)');
      showToast('✨ '+nuevos.length+' nuevo(s) colegio(s) en OSM', 'success');
    } else {
      setStatus('ok', '✓ Sin cambios — '+SCHOOLS_DATA.length.toLocaleString()+' colegios');
    }
  } catch(e) {
    setStatus('error', 'Error en actualización: '+e.message);
  }
  scheduleNext();
}

document.getElementById('newBadge').addEventListener('click', () => {
  addNewMarkers(pendingNew);
  pendingNew = [];
  document.getElementById('statNew').textContent = '0';
  document.getElementById('newBadge').classList.remove('show');
  showToast('Nuevos colegios agregados al mapa', 'success');
});

document.getElementById('deptSelect').addEventListener('change', e => {
  currentDept = e.target.value;
  renderAll(SCHOOLS_DATA, currentDept);
});

function scheduleNext() {
  clearTimeout(refreshTimer); clearInterval(countdownTimer);
  if (!autoRefresh) return;
  nextRefreshAt = Date.now() + CFG.refreshInterval;
  refreshTimer  = setTimeout(bgUpdate, CFG.refreshInterval);
  countdownTimer = setInterval(() => {
    const rem = Math.max(0, Math.round((nextRefreshAt - Date.now())/1000));
    const m=Math.floor(rem/60), s=rem%60;
    document.getElementById('nextUpdate').textContent =
      'Próxima revisión: '+m+':'+String(s).padStart(2,'0');
    if (rem===0) clearInterval(countdownTimer);
  }, 1000);
}

document.getElementById('btnAutoToggle').addEventListener('click', () => {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('btnAutoToggle');
  if (autoRefresh) {
    btn.textContent = '⏸ Pausar auto'; btn.className = 'btn btn-secondary';
    scheduleNext(); showToast('Auto-actualización activada (cada 5 min)','success');
  } else {
    btn.textContent = '▶ Reanudar auto'; btn.className = 'btn';
    clearTimeout(refreshTimer); clearInterval(countdownTimer);
    document.getElementById('nextUpdate').textContent = 'Pausado';
  }
});

function setStatus(type, text) {
  document.getElementById('statusDot').className    = 'dot '+type;
  document.getElementById('statusText').textContent = text;
}
let toastTimer;
function showToast(msg, type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+type;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{el.className='';},3500);
}

(function init() {
  document.getElementById('statTotal').textContent = SCHOOLS_DATA.length.toLocaleString();
  renderAll(SCHOOLS_DATA, 'all');
  document.getElementById('loadingOverlay').classList.add('hidden');
  setStatus('ok', '✓ '+SCHOOLS_DATA.length.toLocaleString()+' colegios precargados');
  showToast('Carga instantánea — datos precargados ✓','success');
  scheduleNext();
})();
</script>
</body>
</html>
